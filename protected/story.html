<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is That A Sign From God? - Story</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/story-styles.css">
</head>
<body>

    <!-- Background Elements -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <div class="bg-grid"></div>
    <div class="corner-accent corner-accent-tl"></div>
    <div class="corner-accent corner-accent-br"></div>
    <div class="noise-overlay"></div>



    <!-- Progress Bar -->
    <div class="reading-progress" id="progressBar"></div>
    
    <!-- Minimalist Navigation -->
    <nav class="story-nav">
        <div class="nav-content">
            <a href="../index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Home</span>
            </a>
            <div class="reading-info">
                <i class="fas fa-clock"></i>
                <span id="readingTime">30 min read</span>
            </div>
        </div>
    </nav>

    <!-- Story Container -->
    <article class="story-container">
        <!-- Header -->
        <header class="story-header">
            <div class="header-bg">
                <img src="https://i.supaimg.com/da82ff61-82a1-4671-b822-8d604ecdeb33.png" alt="Story Header">
                <div class="header-overlay"></div>
            </div>
            <div class="header-content">
                <div class="story-meta">
                    <span><i class="fas fa-book-open"></i> Story</span>
                    <span><i class="fas fa-user"></i> Ronit Kumar Majhi</span>
                </div>
                <h1 class="story-title">Is That A Sign From God?</h1>
                <p class="story-subtitle">A Story of Faith, Love, and Destiny</p>
            </div>
        </header>

        <!-- Story Content -->
        <div class="story-content" id="storyText">
            <!-- Content will be loaded here by JavaScript -->
        </div>

        <!-- Story Footer -->
        <footer class="story-footer">
            <div class="footer-divider">
                <i class="fas fa-heart"></i>
            </div>
            <p class="footer-text">Thank you for reading</p>
            <a href="../index.html" class="footer-link">
                <i class="fas fa-home"></i>
                Return to Home
            </a>
        </footer>
    </article>

    <!-- Floating Actions -->
<div class="floating-actions">
    <button class="action-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Scroll to Top">
        <i class="fas fa-arrow-up"></i>
    </button>
    <button class="action-btn" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})" title="Scroll to Bottom">
        <i class="fas fa-arrow-down"></i>
    </button>
</div>
    <script src="../js/auth.js"></script>
    <script src="content.js"></script>
</body>
</html>
